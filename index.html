<!DOCTYPE html>
<html>
<head>
  <title>Islanders Global</title>
  <script src="//unpkg.com/globe.gl"></script>
  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
    }
    #logo {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 220px;
  height: auto;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 1000;
}

#logo:hover {
  opacity: 0.6;
  filter: blur(2px);
}
    #popup {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      display: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  
<img id="logo" src="logo.png">
  
<div id="globe"></div>
<div id="popup"></div>

<script>

const locations = [
  {
    lat: 41.9028,
    lng: 12.4964,
    username: "examplefan",
    date: "March 2026",
    photo: "https://via.placeholder.com/200"
  }
];

const globe = Globe()
  (document.getElementById('globe'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
  .backgroundColor('black')
  .pointsData(locations)
  .pointLat('lat')
  .pointLng('lng')
  .pointColor(() => 'orange')
  .pointAltitude(0.02)
  .onPointClick(point => {
    document.getElementById("popup").innerHTML = `
      <img src="${point.photo}" width="200"><br>
      <strong>@${point.username}</strong><br>
      ${point.date}
    `;
    document.getElementById("popup").style.display = "block";

    globe.pointOfView(
      { lat: point.lat, lng: point.lng, altitude: 1.5 },
      1000
    );
  });

</script>

</body>
</html>
