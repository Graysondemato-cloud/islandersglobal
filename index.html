<!DOCTYPE html>
<html>
<head>
<title>Islanders Global</title>
<script src="//unpkg.com/globe.gl"></script>
<style>
body {
margin: 0;
#logo {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 120px;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 1000;
}

#logo:hover {
  opacity: 0.6;
  filter: blur(2px);
}
background: black;
font-family: Arial;
}
#popup {
position: absolute;
top: 20px;
left: 20px;
background: orange;
padding: 25px;
display: none;
border-radius: 10px;
}
</style>
</head>

<body>
<img id="logo" src="https://cdn.discordapp.com/attachments/881958571963736126/1479311915489431552/A60DBB2D-D75B-4F18-B55A-B1A3F1CD3D37.png?ex=69ab9414&is=69aa4294&hm=760dec3062feab43bb30568ecbf33e576b3f91a0623a586614ece062f8d7984f">
<div id="globe"></div>
<div id="popup"></div>

<script>

const locations = [
{
lat: 59.3327,
lng: 18.0656,
username: "vic.eklund",
date: "Stockholm, Sweden - March 2026",
photo: "https://sanjosehockeynow.com/wp-content/uploads/sites/7/2025/06/Victor-Eklund-Screen-Shot-2025-06-04-at-6.33.50-PM.png"
}
];

const globe = Globe()
(document.getElementById('globe'))
.globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
.backgroundColor('black')
.pointsData(locations)
.pointLat('lat')
.pointLng('lng')
.pointColor(() => 'orange')
.pointAltitude(0.02)
.onPointClick(point => {
document.getElementById("popup").innerHTML = `
<img src="${point.photo}" width="200"><br>
<strong>@${point.username}</strong><br>
${point.date}
`;
document.getElementById("popup").style.display = "block";

globe.pointOfView(
{ lat: point.lat, lng: point.lng, altitude: 1.5 },
1000
);
});

</script>

</body>
</html>
