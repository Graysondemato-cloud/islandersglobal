<!DOCTYPE html>
<html>
<head>
<title>Islanders Global</title>
<script src="//unpkg.com/globe.gl"></script>
<style>
body {
margin: 0;
background: white;
font-family: Arial;
}
#popup {
position: absolute;
top: 20px;
left: 20px;
background: white;
padding: 15px;
display: none;
border-radius: 10px;
}
</style>
</head>

<body>

<div id="globe"></div>
<div id="popup"></div>

<script>

const locations = [
{
lat: 59.3327,
lng: 18.0656,
username: "vic.eklund",
date: "Stockholm, Sweden 🇸🇪 March 2026",
photo: "https://sanjosehockeynow.com/wp-content/uploads/sites/7/2025/06/Victor-Eklund-Screen-Shot-2025-06-04-at-6.33.50-PM.png"
}
];

const globe = Globe()
(document.getElementById('globe'))
.globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
.backgroundColor('white')
.pointsData(locations)
.pointLat('lat')
.pointLng('lng')
.pointColor(() => 'orange')
.pointAltitude(0.02)
.onPointClick(point => {
document.getElementById("popup").innerHTML = `
<img src="${point.photo}" width="200"><br>
<strong>@${point.username}</strong><br>
${point.date}
`;
document.getElementById("popup").style.display = "block";

globe.pointOfView(
{ lat: point.lat, lng: point.lng, altitude: 1.5 },
1000
);
});

</script>

</body>
</html>
