<!DOCTYPE html>
<html>
<head>
  <title>Islanders Global</title>
  <script src="//unpkg.com/globe.gl"></script>
  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
  html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#globe {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
    }
    #logo {
  position: absolute;
  top: 15px;
  right: 10px;
  width: 220px;
  height: auto;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 1000;
}

#logo:hover {
  opacity: 0.6;
  filter: blur(2px);
}
    #popup {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      display: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  
<img id="logo" src="https://media.discordapp.net/attachments/881958571963736126/1479329232315220018/D1170725-5344-441A-B0DC-8EE35138E552.png?ex=69aba435&is=69aa52b5&hm=ebcdd3eb9b80dd254a64d828bc63f9e285b0c551b5f02d5c3f97cf757daf17b5&=&format=webp&quality=lossless&width=1860&height=623">
  
<div id="globe"></div>
<div id="popup"></div>

<script>

const locations = [
  {
    lat: 59.33,
    lng: 18.06,
    username: "vic.eklund",
    date: "Stockholm, Sweden, March 2026",
    photo: "https://www.dailyfaceoff.com/_next/image?url=https%3A%2F%2Fpublish.dailyfaceoff.com%2Fwp-content%2Fuploads%2F2025%2F06%2FSE5_3128-scaled.jpg&w=3840&q=75"
  }
];

const globe = Globe()
  (document.getElementById('globe'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
  .backgroundColor('black')
  .pointsData(locations)
  .pointLat('lat')
  .pointLng('lng')
  .pointColor(() => 'orange')
  .pointAltitude(0.02)
  .onPointClick(point => {
    document.getElementById("popup").innerHTML = `
      <img src="${point.photo}" width="200"><br>
      <strong>@${point.username}</strong><br>
      ${point.date}
    `;
    document.getElementById("popup").style.display = "block";

    globe.pointOfView(
      { lat: point.lat, lng: point.lng, altitude: 1.5 },
      1000
    );
  });

</script>

</body>
</html>
