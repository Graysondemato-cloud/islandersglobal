<!DOCTYPE html>
<html>
<head>
<script src="//unpkg.com/globe.gl"></script>
<style>
body { margin: 0; }
#popup {
position: absolute;
top: 20px;
left: 20px;
background: white;
padding: 10px;
display: none;
}
</style>
</head>
<body>

<div id="globe"></div>
<div id="popup"></div>

<script>
const locations = [
{
lat: 41.9028,
lng: 12.4964,
username: "islesfan23",
date: "March 2026",
photo: "rome.jpg"
}
];

const globe = Globe()
(document.getElementById('globe'))
.globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
.pointsData(locations)
.pointLat('lat')
.pointLng('lng')
.pointColor(() => 'orange')
.onPointClick(point => {
document.getElementById("popup").innerHTML = `
<img src="${point.photo}" width="200"/>
<p>@${point.username}</p>
<p>${point.date}</p>
`;
document.getElementById("popup").style.display = "block";
});
</script>

</body>
</html>
